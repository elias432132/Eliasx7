name: Gerar APK PVP ZONE X7

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Construir APK Android
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar os arquivos do jogo
        uses: actions/checkout@v4

      - name: 2. Configurar o Motor (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. Configurar Sistema Android (Java)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Instalar o Construtor de Apps (Cordova)
        run: npm install -g cordova

      - name: 5. Montar a Estrutura do App
        run: |
          cordova create app com.elias.freex7 "Free X7"
          rm -rf app/www/*
          cp index.html app/www/
          cp -r img app/www/img || true

      - name: 6. Gerar o arquivo APK
        working-directory: ./app
        run: |
          cordova platform add android
          cordova build android

      - name: 7. Salvar o APK pronto para baixar
        uses: actions/upload-artifact@v4
        with:
          name: FreeX7-APK-Android
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
