<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Free X7 - Servidor Global PvP</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; touch-action: none; }
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .fullscreen-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #111, #2c3e50); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; overflow-y: auto; }
        .hidden { display: none !important; }
        
        .btn-main { background: #e67e22; color: white; border: 3px solid #d35400; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 4px; box-shadow: 0 4px #a83f00;}
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px #000; }
        .btn-sub { background: #34495e; color: white; border: 3px solid #2c3e50; padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 4px; box-shadow: 0 4px #1a252f;}
        
        /* Auras e Ranks */
        .badge-patente { padding: 5px 15px; border-radius: 20px; border: 2px solid #f39c12; color: white; font-weight: bold; font-size: 14px; background: linear-gradient(90deg, #b87333, #e67e22); }
        .aura-tita-30 { box-shadow: 0 0 15px #3498db, 0 0 30px #3498db !important; border-color: #3498db !important; }
        .aura-tita-elite { box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, inset 0 0 10px #ff00ff !important; border-color: #ff00ff !important; background: linear-gradient(135deg, #8e44ad, #ff00ff) !important; text-shadow: 2px 2px 4px #000;}

        /* HUD Jogo e Placar */
        #game-ui { display: none; width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud-top { position: absolute; top: 8px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 10; pointer-events: none; flex-wrap: wrap; }
        .hud-item { background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 8px; border: 1px solid #555; font-weight: bold; font-size: 13px; pointer-events: auto; }
        
        #arena-placar { background: rgba(0,0,0,0.9); padding: 5px 15px; border-radius: 8px; border: 2px solid #e67e22; color: white; font-size: 16px; font-weight: bold; text-align: center;}
        .pontos-timeA { color: #3498db; }
        .pontos-timeB { color: #e74c3c; }
        #arena-timer { color: #f1c40f; margin: 0 10px; }

        #controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .ctrl-btn { position: absolute; pointer-events: auto; background: rgba(51, 51, 51, 0.75); color: white; border: 2px solid #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; cursor: pointer; transform: translate(-50%, -50%); transition: box-shadow 0.2s;}
        
        #aviso-round { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: 900; color: #f1c40f; text-shadow: 3px 3px 0 #000; z-index: 50; display: none; text-align: center; width: 100%;}
    </style>
</head>
<body>

<div id="start-menu" class="fullscreen-menu">
    <h1>FREE X7 <span style="color:#f1c40f;font-size:16px;">ONLINE</span></h1>
    <div id="badge-patente-menu" class="badge-patente">🏆 BRONZE I</div>
    <div style="margin: 20px 0;">
        <button class="btn-main" onclick="procurarPartida('solo')">👤 JOGAR X1</button>
        <button class="btn-main" onclick="procurarPartida('duo')" style="background:#8e44ad; border-color:#732d91;">👥 JOGAR 2v2</button>
        <button class="btn-main" onclick="procurarPartida('squad')" style="background:#c0392b; border-color:#922b21;">🔥 JOGAR 4v4 (CS)</button>
    </div>
</div>

<div id="matchmaking-screen" class="fullscreen-menu hidden">
    <h2 style="color:#f1c40f;">PROCURANDO JOGADORES...</h2>
    <p style="color:#ccc; font-size:12px;">Se não achar jogadores reais, a sala será completada com Bots!</p>
    <p id="match-timer">00:00</p>
    <button class="btn-sub" style="background:#c0392b;" onclick="window.location.reload()">CANCELAR</button>
</div>

<div id="game-ui">
    <div id="hud-top">
        <div id="arena-placar">
            <span class="pontos-timeA" id="placar-A">0</span> 
            <span id="arena-timer">⏱️ 05:00</span> 
            <span class="pontos-timeB" id="placar-B">0</span>
            <div style="font-size: 11px; color:#aaa;" id="label-round">ROUND 1</div>
        </div>
        <span class="hud-item" style="color:#e74c3c;" id="arena-hp">❤️ 100</span>
    </div>
    
    <div id="aviso-round">ROUND 1<br><span style="font-size:20px; color:#fff;">BATALHEM!</span></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
        <div class="ctrl-btn" id="btn-left" style="left:10%; top:80%; width:65px; height:65px;">◀</div>
        <div class="ctrl-btn" id="btn-right" style="left:23%; top:80%; width:65px; height:65px;">▶</div>
        <div class="ctrl-btn" id="btn-jump" style="left:75%; top:80%; width:65px; height:65px;">PULO</div>
        <div class="ctrl-btn" id="btn-fire" style="left:88%; top:80%; width:75px; height:75px; background:rgba(230,126,34,0.9); border-color:#d35400;">TIRO</div>
    </div>
</div>

<script>
// ==========================================
// CONEXÃO ONLINE
// ==========================================
const socket = io("https://eliasx7.onrender.com"); // Coloque o link do seu Render
let jogadoresOnline = {};

let dbUsuarios = JSON.parse(localStorage.getItem('ff2d_users_db')) || {};
let meuPerfil = dbUsuarios['local'] || { nickOriginal: "Player", pontosRank: 0, isVIP: false, equippedSkin: 'padrao' };
let meuTime = 'A'; 

// ==========================================
// SISTEMA DE PATENTES (Escalonado de I a IV)
// ==========================================
function calcularPatente(pontos) {
    let p = pontos || 0;
    // Bronze 1, 2, 3, 4
    if (p < 1000) return { nome: `🏆 BRONZE ${['I','II','III','IV'][Math.floor(p/250)] || 'IV'}`, aura: "" };
    // Prata 1, 2, 3, 4
    if (p < 2000) return { nome: `🥈 PRATA ${['I','II','III','IV'][Math.floor((p-1000)/250)] || 'IV'}`, aura: "" };
    // Ouro 1, 2, 3, 4
    if (p < 3000) return { nome: `🥇 OURO ${['I','II','III','IV'][Math.floor((p-2000)/250)] || 'IV'}`, aura: "" };
    // Platina
    if (p < 4000) return { nome: `💠 PLATINA ${['I','II','III','IV'][Math.floor((p-3000)/250)] || 'IV'}`, aura: "" };
    // Diamante
    if (p < 5000) return { nome: `💎 DIAMANTE ${['I','II','III','IV'][Math.floor((p-4000)/250)] || 'IV'}`, aura: "" };
    // Bárbaro
    if (p < 6000) return { nome: `🪓 BÁRBARO ${Math.floor((p-5000)/200)+1}⭐`, aura: "" };
    // Titã 1 a 50
    if (p < 10000) {
        let nv = Math.floor((p-6000)/80)+1; if(nv>50) nv=50;
        return { nome: `⚡ TITÃ ${nv}`, aura: nv >= 30 ? "aura-tita-30" : "" };
    }
    // Titã Elite 1 a 999
    let nve = Math.floor((p-10000)/100)+1; if(nve>999) nve=999;
    return { nome: `🔥 TITÃ ELITE ${nve}`, aura: "aura-tita-elite" };
}

function atualizarHUDPatente() {
    let patente = calcularPatente(meuPerfil.pontosRank);
    let el = document.getElementById('badge-patente-menu');
    el.innerText = patente.nome; el.className = "badge-patente " + patente.aura;
}
atualizarHUDPatente();

// ==========================================
// MATCHMAKING & LÓGICA DE ROUNDS
// ==========================================
let gameRunning = false, modoAtual = 'solo';
let tempoBusca = 0, intervaloBusca = null;

// Variáveis da Partida (CS Mode)
let placarA = 0;
let placarB = 0;
let roundAtual = 1;
let tempoRoundRestante = 300; // 5 minutos = 300s
let lastTickTime = Date.now();
let roundStatus = 'PLAYING'; // PLAYING, WAITING

function procurarPartida(modo) {
    modoAtual = modo;
    document.getElementById('start-menu').classList.add('hidden');
    document.getElementById('matchmaking-screen').classList.remove('hidden');
    tempoBusca = 0;
    intervaloBusca = setInterval(() => { tempoBusca++; document.getElementById('match-timer').innerText = tempoBusca + "s"; }, 1000);
    socket.emit('buscar_partida', { nick: meuPerfil.nickOriginal, modo: modoAtual });
}

socket.on('partida_encontrada', (dados) => {
    clearInterval(intervaloBusca);
    if(dados.timeA && dados.timeA.includes(socket.id)) meuTime = 'A'; else meuTime = 'B';
    
    document.getElementById('matchmaking-screen').classList.add('hidden');
    document.getElementById('game-ui').style.display = 'block';
    
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    // Reseta placa da partida
    placarA = 0; placarB = 0; roundAtual = 1;
    document.getElementById('placar-A').innerText = placarA;
    document.getElementById('placar-B').innerText = placarB;
    
    iniciarRound(); // Chama o primeiro round
    gameRunning = true;
    requestAnimationFrame(gameLoop);
});

socket.on('posicoes_jogadores', (dados) => { jogadoresOnline = dados; });

function iniciarRound() {
    roundStatus = 'PLAYING';
    tempoRoundRestante = 300; // Reseta timer (5 Min)
    lastTickTime = Date.now();
    
    document.getElementById('label-round').innerText = `ROUND ${roundAtual}`;
    
    // Mostra o Banner de Round no meio da tela e some depois de 2s
    let aviso = document.getElementById('aviso-round');
    aviso.innerHTML = `ROUND ${roundAtual}<br><span style="font-size:20px; color:#fff;">BATALHEM!</span>`;
    aviso.style.display = 'block';
    setTimeout(() => { aviso.style.display = 'none'; }, 2000);

    // Reseta Jogador
    player.hp = 100;
    player.x = meuTime === 'A' ? 100 : canvas.width - 100;
    player.facing = meuTime === 'A' ? 1 : -1;
    player.isDead = false;
    document.getElementById('arena-hp').innerText = "❤️ 100";
    
    // Reseta Tiros
    bullets = [];

    // Recria os BOTS (Preenche as vagas vazias da sala)
    botsAtivos = [];
    let qtdInimigos = modoAtual === 'solo' ? 1 : (modoAtual === 'duo' ? 2 : 4); 
    let qtdAliados = modoAtual === 'solo' ? 0 : (modoAtual === 'duo' ? 1 : 3);
    for(let i=0; i<qtdInimigos; i++) botsAtivos.push(criarBot('B', i));
    for(let i=0; i<qtdAliados; i++) botsAtivos.push(criarBot('A', i+10));
}

// Quando um time morre inteiro, chama essa função
function fimDoRound(vencedorTime) {
    if(roundStatus === 'WAITING') return;
    roundStatus = 'WAITING'; // Impede de somar 2 vezes
    
    if(vencedorTime === 'A') placarA++;
    if(vencedorTime === 'B') placarB++;
    
    document.getElementById('placar-A').innerText = placarA;
    document.getElementById('placar-B').innerText = placarB;
    
    let aviso = document.getElementById('aviso-round');
    aviso.innerHTML = `TIME ${vencedorTime} VENCEU O ROUND!<br><span style="font-size:20px; color:#fff;">PREPARANDO...</span>`;
    aviso.style.display = 'block';

    // Checa se alguém chegou a 4 Vitórias (Venceu a Partida Inteira)
    if (placarA >= 4 || placarB >= 4) {
        let venci = (placarA >= 4 && meuTime === 'A') || (placarB >= 4 && meuTime === 'B');
        setTimeout(() => { finalizarPartidaMatch(venci); }, 3000);
    } else {
        // Se não, passa pro próximo round
        roundAtual++;
        setTimeout(() => { iniciarRound(); }, 3000);
    }
}

function finalizarPartidaMatch(venceu) {
    gameRunning = false;
    document.getElementById('aviso-round').style.display = 'none';
    
    // Atualiza a Patente
    let ganho = venceu ? 50 : 10;
    meuPerfil.pontosRank = (meuPerfil.pontosRank || 0) + ganho;
    dbUsuarios['local'] = meuPerfil;
    localStorage.setItem('ff2d_users_db', JSON.stringify(dbUsuarios));
    atualizarHUDPatente();
    
    alert(venceu ? `🔥 BOOYAH! Você venceu e ganhou +${ganho} Pts de Rank!` : `💀 DERROTA! Seu time perdeu, mas ganhou +${ganho} Pts.`);
    
    // Volta pro Lobby
    document.getElementById('game-ui').style.display = 'none';
    document.getElementById('start-menu').classList.remove('hidden');
}


// ==========================================
// ARENA, FÍSICA E BOTS
// ==========================================
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
let player = { x: 100, y: 0, vy: 0, hp: 100, speed: 5, facing: 1, isGrounded: true, isDead: false };
let bullets = []; let botsAtivos = []; let lastShotTime = 0; let keys = { left: false, right: false, jump: false, fire: false };

// Eventos de Controle Simples
document.getElementById('btn-left').addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.left=true; });
document.getElementById('btn-left').addEventListener('touchend', (e)=>{ e.preventDefault(); keys.left=false; });
document.getElementById('btn-right').addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.right=true; });
document.getElementById('btn-right').addEventListener('touchend', (e)=>{ e.preventDefault(); keys.right=false; });
document.getElementById('btn-jump').addEventListener('touchstart', (e)=>{ e.preventDefault(); if(player.isGrounded && !player.isDead) { player.vy = 12.5; player.isGrounded = false; } });
document.getElementById('btn-fire').addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.fire=true; });
document.getElementById('btn-fire').addEventListener('touchend', (e)=>{ e.preventDefault(); keys.fire=false; });

function criarBot(time, index) {
    return { id: 'bot_'+index, x: time==='A'? 50+Math.random()*100 : window.innerWidth-150, y: 0, vy: 0, hp: 100, speed: 2+Math.random(), facing: time==='A'?1:-1, isGrounded: true, time: time, lastShot: Date.now(), taxaTiro: 800 + Math.random()*500 };
}

function gameLoop() {
    if (!gameRunning) return;
    requestAnimationFrame(gameLoop);
    
    let gy = canvas.height * 0.75;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Fundo Basico
    ctx.fillStyle = "#2c3e50"; ctx.fillRect(0, 0, canvas.width, gy);
    ctx.fillStyle = "#1a252f"; ctx.fillRect(0, gy, canvas.width, canvas.height - gy);

    // ==========================================
    // CRONÔMETRO (Timer do Round 5:00)
    // ==========================================
    if (roundStatus === 'PLAYING') {
        if (Date.now() - lastTickTime >= 1000) {
            tempoRoundRestante--; lastTickTime = Date.now();
        }
        if (tempoRoundRestante <= 0) {
            fimDoRound('EMPATE'); // Acabou o tempo
        } else {
            let m = Math.floor(tempoRoundRestante / 60);
            let s = tempoRoundRestante % 60;
            document.getElementById('arena-timer').innerText = `⏱️ 0${m}:${s<10?'0':''}${s}`;
        }
    }

    // ==========================================
    // FÍSICA E MOVIMENTO DO PLAYER
    // ==========================================
    if(player.hp <= 0) player.isDead = true;

    if (!player.isDead && roundStatus === 'PLAYING') {
        if (!player.isGrounded) player.vy -= 0.5;
        player.y += player.vy;
        if(player.y <= 0) { player.y = 0; player.vy = 0; player.isGrounded = true; }
        
        if (keys.left) { player.x -= player.speed; player.facing = -1; }
        if (keys.right) { player.x += player.speed; player.facing = 1; }
        if (player.x < 0) player.x = 0; if (player.x > canvas.width) player.x = canvas.width;

        // Atirar
        if (keys.fire && Date.now() - lastShotTime > 350) { 
            bullets.push({x: player.x + (20 * player.facing), y: player.y + 40, vx: 20 * player.facing, owner: 'local', dmg: 15, time: meuTime}); 
            lastShotTime = Date.now(); 
        }

        // Sincroniza Posição para o Servidor
        socket.emit('mover', { x: player.x, y: player.y, facing: player.facing, hp: player.hp, nick: meuPerfil.nickOriginal });
    }

    // ==========================================
    // VERIFICADOR DE VITÓRIA DO ROUND
    // ==========================================
    if (roundStatus === 'PLAYING') {
        let vivosA = (meuTime === 'A' && !player.isDead) ? 1 : 0;
        let vivosB = (meuTime === 'B' && !player.isDead) ? 1 : 0;
        
        botsAtivos.forEach(b => {
            if(b.hp > 0) { if(b.time === 'A') vivosA++; else vivosB++; }
        });

        // Se todo o time inimigo morreu, o round acaba
        if (vivosA === 0) fimDoRound('B');
        else if (vivosB === 0) fimDoRound('A');
    }

    // ==========================================
    // LÓGICA DOS BOTS E TIROS
    // ==========================================
    botsAtivos.forEach(bot => {
        if(bot.hp <= 0) return;
        if(roundStatus === 'PLAYING') {
            // Busca o inimigo mais próximo
            let targetX = player.x; // Simplificado para focar no player
            if(player.isDead || meuTime === bot.time) targetX = (bot.time==='A' ? canvas.width-100 : 100);

            let dist = targetX - bot.x;
            if(Math.abs(dist) > 200) {
                bot.facing = dist > 0 ? 1 : -1;
                bot.x += bot.speed * bot.facing;
            } else {
                bot.facing = dist > 0 ? 1 : -1;
            }
            
            // Bot Atira
            if(Date.now() > bot.lastShot + bot.taxaTiro && Math.abs(dist) < 500) {
                bullets.push({x: bot.x + (20 * bot.facing), y: bot.y + 40, vx: 15 * bot.facing, owner: bot.id, dmg: 10, time: bot.time}); 
                bot.lastShot = Date.now();
            }
        }
        desJogador(bot.x, gy+bot.y, bot.facing, bot.id, bot.time === meuTime ? '#3498db' : '#e74c3c');
    });

    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.x += b.vx;
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x, gy - b.y, 10, 4);
        
        // Verifica acerto em BOTS
        botsAtivos.forEach(bot => { 
            if(bot.hp > 0 && bot.time !== b.time && Math.abs(b.x - bot.x) < 30) { bot.hp -= b.dmg; bullets.splice(i, 1); } 
        });
        
        // Verifica acerto no PLAYER
        if(!player.isDead && b.time !== meuTime && Math.abs(b.x - player.x) < 30) {
            player.hp -= b.dmg; document.getElementById('arena-hp').innerText = `❤️ ${Math.floor(player.hp)}`; 
            if(bullets[i]) bullets.splice(i, 1);
        }
    }

    // ==========================================
    // RENDERIZA JOGADORES
    // ==========================================
    if(!player.isDead) desJogador(player.x, gy+player.y, player.facing, meuPerfil.nickOriginal, '#2ecc71');
    
    // Renderiza players da rede
    Object.keys(jogadoresOnline).forEach(id => {
        if (id !== socket.id) {
            let p = jogadoresOnline[id];
            if(p.hp > 0) desJogador(p.x, gy+p.y, p.facing, p.nick, '#e67e22');
        }
    });
}

function desJogador(x, baseY, facing, nick, color) {
    ctx.save(); ctx.translate(x, baseY); ctx.scale(facing, 1);
    ctx.fillStyle = color; ctx.fillRect(-15, -65, 30, 65); // Quadrado provisório para evitar erro de imagem
    ctx.restore();
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 12px Arial";
    ctx.fillText(nick, x, baseY - 70);
}
</script>
</body>
</html>
