<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS STRIKE - Painel do Dono</title>
    <style>
        body { background-color: #0d1b2a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1, h2 { color: #00ecff; text-transform: uppercase; text-shadow: 0 0 10px #00ecff; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(0,0,0,0.6); padding: 25px; border-radius: 15px; border: 2px solid #1b263b; box-shadow: 0 0 20px rgba(0,236,255,0.2); }
        .section { background: #1b263b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #415a77; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #e0e1dd; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; background: #0d1b2a; color: #fff; border: 1px solid #415a77; border-radius: 5px; box-sizing: border-box; font-weight: bold; }
        input:focus, select:focus { border-color: #00ecff; outline: none; }
        button { background: #e67e22; color: white; border: none; padding: 12px 20px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 4px #a83f00; text-transform: uppercase; width: 100%; margin-bottom: 10px; }
        button:hover { background: #d35400; transform: scale(1.01); }
        button.btn-danger { background: #c0392b; box-shadow: 0 4px #6d2018; }
        button.btn-danger:hover { background: #a93226; }
        button.btn-success { background: #2ecc71; box-shadow: 0 4px #27ae60; }
        button.btn-success:hover { background: #27ae60; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        #log-area { background: #000; color: #2ecc71; font-family: monospace; padding: 15px; height: 150px; overflow-y: auto; border-radius: 5px; border: 1px solid #27ae60; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 PAINEL DE CONTROLE - NEXUS STRIKE</h1>
    <p>Gerenciamento Global do Servidor PvP por <strong>PROMOTOR</strong></p>

    <div class="section" style="border-color: #f1c40f;">
        <h2 style="color: #f1c40f; text-shadow: 0 0 10px #f1c40f;">🔑 AUTENTICAÇÃO MASTER</h2>
        <label>Senha Secreta do Admin (ADMIN_SECRET definido no Render):</label>
        <input type="password" id="admin-secret" value="nexusmaster" placeholder="Digite a senha do seu painel...">
    </div>

    <div class="section">
        <h2>👥 CONTROLE DE SOBREVIVENTES</h2>
        <label>Nick do Jogador Alvo:</label>
        <input type="text" id="target-nick" placeholder="Ex: MatadorBR">
        
        <div class="row">
            <div class="col"><button class="btn-success" onclick="comandarJogador('dar-vip')">👑 DAR TAG VIP</button></div>
            <div class="col"><button class="btn-danger" onclick="comandarJogador('remover-vip')">⚠️ REMOVER VIP</button></div>
            <div class="col"><button class="btn-danger" onclick="comandarJogador('banir')">🚫 BANIR CONTA</button></div>
        </div>
        <button style="background: #34495e; box-shadow: 0 4px #1a252f;" onclick="listarJogadoresOnline()">🔄 LISTAR JOGADORES CONECTADOS</button>
        <div id="lista-jogadores-area" style="margin-top:10px; font-size:14px; color:#00ecff;"></div>
    </div>

    <div class="section">
        <h2>🎁 FÁBRICA DE CODIGUINS (DIAMANTES)</h2>
        <label>Quantidade de Diamantes no Código:</label>
        <input type="number" id="codiguin-dimas" value="500" min="1">
        <button class="btn-success" onclick="gerarCodiguin()">⚡ GERAR CODIGUIN OFICIAL</button>
        <div id="resultado-codiguin" style="margin-top:10px; font-size:18px; font-weight:bold; color:#f1c40f; text-align:center;"></div>
    </div>

    <div class="section" style="border-color: #00ecff;">
        <h2>🛒 INJETOR DE ITENS DA LOJA</h2>
        
        <div class="row">
            <div class="col">
                <label>Tipo de Item:</label>
                <select id="item-tipo" onchange="toggleConfigFrames()">
                    <option value="skins">Personagem (Skin Animada)</option>
                    <option value="weapons">Arma (Weapon)</option>
                    <option value="gelos">Parede de Gelo (Gelo - 1 Frame)</option>
                </select>
            </div>
            <div class="col">
                <label>ID Único do Item (Pasta do GitHub):</label>
                <input type="text" id="item-id" placeholder="Ex: gelo_fogo, skin_alok, mp40_titan">
            </div>
        </div>

        <label>Nome Visível na Loja:</label>
        <input type="text" id="item-name" placeholder="Ex: 🧊 Gelo de Fogo Infernal">

        <div class="row">
            <div class="col">
                <label>Preço em Ouro (🪙):</label>
                <input type="number" id="item-price" value="1000" min="0">
            </div>
            <div class="col">
                <label>Preço em Diamantes (💎):</label>
                <input type="number" id="item-priceD" value="250" min="0">
            </div>
        </div>

        <div id="area-config-frames">
            <label>Configuração de Sequência de Frames (Apenas para Personagens):</label>
            <div class="row">
                <div class="col">
                    <label style="font-size:12px;">Parado (IDLE):</label>
                    <input type="text" id="frame-parado" value="1-4" placeholder="Ex: 1-4">
                </div>
                <div class="col">
                    <label style="font-size:12px;">Andando (RUN):</label>
                    <input type="text" id="frame-andando" value="5-12" placeholder="Ex: 5-12">
                </div>
                <div class="col">
                    <label style="font-size:12px;">Pulando (JUMP):</label>
                    <input type="text" id="frame-pulando" value="13-15" placeholder="Ex: 13-15">
                </div>
                <div class="col">
                    <label style="font-size:12px;">Atirando (SHOOT):</label>
                    <input type="text" id="frame-atirando" value="16-22" placeholder="Ex: 16-22">
                </div>
            </div>
        </div>

        <button class="btn-success" style="background: linear-gradient(90deg, #00ecff, #00b4d8); color:#000;" onclick="injetarItemNaLoja()">🚀 INJETAR ITEM NA LOJA ONLINE</button>
    </div>

    <h2>📡 LOGS DE RESPOSTA DO SERVIDOR</h2>
    <div id="log-area">Painel iniciado e aguardando comandos...</div>
</div>

<script>
    const URL_SERVIDOR = "https://eliasx7.onrender.com";

    function log(msg, erro = false) {
        const area = document.getElementById('log-area');
        const cor = erro ? "#e74c3c" : "#2ecc71";
        area.innerHTML += `<br><span style="color:${cor};">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
        area.scrollTop = area.scrollHeight;
    }

    function toggleConfigFrames() {
        const tipo = document.getElementById('item-tipo').value;
        const areaFrames = document.getElementById('area-config-frames');
        // Se for gelo ou arma, não precisa configurar sequência de 22 frames animada
        if (tipo === 'skins') {
            areaFrames.style.display = 'block';
        } else {
            areaFrames.style.display = 'none';
        }
    }

    async function comandarJogador(rota) {
        const secret = document.getElementById('admin-secret').value.trim();
        const nick = document.getElementById('target-nick').value.trim();
        if(!nick) return alert("Digite o Nick do jogador alvo!");

        log(`Enviando comando '${rota}' para o jogador ${nick}...`);
        try {
            const resp = await fetch(`${URL_SERVIDOR}/admin/${rota}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
                body: JSON.stringify({ nick })
            });
            const dados = await resp.json();
            if(dados.sucesso) {
                log(`✅ Sucesso: Comando '${rota}' aplicado em ${nick}!`);
                alert("Comando executado com sucesso!");
            } else {
                log(`❌ Erro do servidor: ${dados.erro}`, true);
                alert("Erro: " + dados.erro);
            }
        } catch(e) {
            log(`❌ Falha de conexão: ${e.message}`, true);
        }
    }

    async function listarJogadoresOnline() {
        const secret = document.getElementById('admin-secret').value.trim();
        try {
            const resp = await fetch(`${URL_SERVIDOR}/admin/jogadores`, {
                method: 'GET',
                headers: { 'x-admin-secret': secret }
            });
            const dados = await resp.json();
            const areaLista = document.getElementById('lista-jogadores-area');
            if(dados.sucesso && dados.lista) {
                if(dados.lista.length === 0) {
                    areaLista.innerText = "Nenhum sobrevivente conectado no Socket agora.";
                } else {
                    areaLista.innerText = "Jogadores online: " + dados.lista.map(j => j.nick).join(", ");
                }
                log("👥 Lista de jogadores atualizada.");
            } else {
                log("❌ Erro ao listar jogadores: " + dados.erro, true);
            }
        } catch(e) {
            log("❌ Erro de conexão ao listar: " + e.message, true);
        }
    }

    async function gerarCodiguin() {
        const secret = document.getElementById('admin-secret').value.trim();
        const dimas = document.getElementById('codiguin-dimas').value;
        
        try {
            const resp = await fetch(`${URL_SERVIDOR}/admin/gerar-codigo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
                body: JSON.stringify({ diamantes: parseInt(dimas) })
            });
            const dados = await resp.json();
            if(dados.sucesso) {
                document.getElementById('resultado-codiguin').innerText = `CODIGUIN GERADO: ${dados.codigo}`;
                log(`🎁 Código de 💎 ${dimas} dimas gerado: ${dados.codigo}`);
            } else {
                log(`❌ Erro ao gerar codiguin: ${dados.erro}`, true);
                alert("Erro: " + dados.erro);
            }
        } catch(e) {
            log(`❌ Erro de conexão: ${e.message}`, true);
        }
    }

    async function injetarItemNaLoja() {
        const secret = document.getElementById('admin-secret').value.trim();
        const tipo = document.getElementById('item-tipo').value;
        const id = document.getElementById('item-id').value.trim();
        const name = document.getElementById('item-name').value.trim();
        const price = document.getElementById('item-price').value;
        const priceD = document.getElementById('item-priceD').value;

        if(!id || !name) return alert("ID e Nome são obrigatórios para injetar!");

        let payload = {
            tipo, id, name,
            price: parseInt(price),
            priceD: parseInt(priceD)
        };

        // Se for personagem, anexa a ordem dos frames de animação
        if (tipo === 'skins') {
            payload.config_frames = {
                parado: document.getElementById('frame-parado').value,
                andando: document.getElementById('frame-andando').value,
                pulando: document.getElementById('frame-pulando').value,
                atirando: document.getElementById('frame-atirando').value
            };
        }

        log(`Injetando novo item [${tipo}] na loja...`);
        try {
            const resp = await fetch(`${URL_SERVIDOR}/admin/add-loja`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
                body: JSON.stringify(payload)
            });
            const dados = await resp.json();
            if(dados.sucesso) {
                log(`🚀 SUCESSO! '${name}' foi parar na loja global do jogo!`);
                alert("Item injetado na loja com sucesso!");
            } else {
                log(`❌ Erro ao injetar item: ${dados.erro}`, true);
                alert("Erro: " + dados.erro);
            }
        } catch(e) {
            log(`❌ Erro de conexão: ${e.message}`, true);
        }
    }

    // Inicia verificando o estado dos inputs de frames
    toggleConfigFrames();
</script>

</body>
</html>
